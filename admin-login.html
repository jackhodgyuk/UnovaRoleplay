<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unova Admin Login</title>

<link rel="icon" type="image/gif" href="https://r2.fivemanage.com/O8nsC8f5nKWaQAbWhOnvx/3dgifmaker27271.gif">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
color:white;
}

.background{
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,0.82), rgba(0,0,0,0.92)),
url('https://r2.fivemanage.com/O8nsC8f5nKWaQAbWhOnvx/unovabanner.gif');
background-size:cover;
background-position:center;
z-index:-2;
}

.glow{
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:rgba(0,255,200,0.12);
filter:blur(120px);
top:-100px;
right:-100px;
z-index:-1;
}

.login-box{
width:90%;
max-width:420px;
padding:40px;
border-radius:28px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:90px;
height:90px;
object-fit:contain;
filter:drop-shadow(0 0 18px rgba(0,255,195,0.45));
margin-bottom:14px;
}

.logo h1{
color:#00ffc3;
font-size:2rem;
}

input{
width:100%;
padding:16px;
margin-bottom:18px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.06);
color:white;
font-size:1rem;
}

input:focus{
outline:none;
border:1px solid rgba(0,255,195,0.4);
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#00ffc3;
color:black;
font-weight:700;
font-size:1rem;
cursor:pointer;
transition:0.3s ease;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 0 30px rgba(0,255,195,0.35);
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:rgba(255,255,255,0.7);
text-decoration:none;
}

.error{
margin-top:16px;
text-align:center;
color:#ff5e5e;
display:none;
font-size:0.9rem;
word-break:break-word;
}

.info{
margin-top:18px;
text-align:center;
font-size:0.9rem;
color:rgba(255,255,255,0.55);
}

</style>

</head>

<body>

<div class="background"></div>
<div class="glow"></div>

<div class="login-box">

<div class="logo">

<img src="https://r2.fivemanage.com/O8nsC8f5nKWaQAbWhOnvx/3dgifmaker27271.gif">

<h1>Admin Login</h1>

</div>

<input
type="email"
id="username"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<div class="error" id="error">
Invalid email or password.
</div>

<div class="info">
Authorized Unova Management Only
</div>

<a href="index.html" class="back">
← Back To Homepage
</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyDVeGxU1lsvEQMdl1VAW4G-kSKkCWfCXgI",

authDomain: "unova-rp.firebaseapp.com",

projectId: "unova-rp",

storageBucket: "unova-rp.firebasestorage.app",

messagingSenderId: "872319010623",

appId: "1:872319010623:web:8fb1d16d4535b9a567758a",

measurementId: "G-KD69CW2DLK"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

function login(){

const email =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

auth.signInWithEmailAndPassword(email, password)

.then(() => {

window.location.href = "admin.html";

})

.catch((error) => {

console.log(error);

document.getElementById("error").style.display = "block";

document.getElementById("error").innerText =
error.code + " : " + error.message;

});

}

</script>

</body>
</html>
